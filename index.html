<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#070718" />
    <title>Space Blaster</title>
  </head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background-color: black;
      font-family: monospace;
      /* Mobile: no scroll bounce, no text selection, no double-tap zoom,
         no long-press callout, and let the game handle all touch gestures. */
      position: fixed;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }
    canvas {
      display: block;
      touch-action: none;
    }
    #score-submit {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      justify-content: center;
      align-items: center;
      z-index: 10;
    }
    #score-submit.show { display: flex; }
    #score-submit .box {
      background: rgba(10, 10, 30, 0.95);
      border: 1px solid rgba(0, 200, 255, 0.3);
      border-radius: 12px;
      padding: 36px 40px;
      text-align: center;
      max-width: 380px;
      width: 90%;
    }
    #score-submit h2 {
      color: #ffea00;
      font-size: 22px;
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(255, 234, 0, 0.4);
    }
    #score-submit p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      margin-bottom: 20px;
    }
    #score-submit input {
      display: block;
      width: 100%;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(0, 200, 255, 0.3);
      border-radius: 6px;
      color: #fff;
      font: 16px monospace;
      text-align: center;
      outline: none;
      margin-bottom: 16px;
    }
    #score-submit input:focus {
      border-color: #00e5ff;
      box-shadow: 0 0 12px rgba(0, 229, 255, 0.2);
    }
    #score-submit input::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }
    #score-submit .btn-row {
      display: flex;
      gap: 10px;
    }
    #score-submit button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font: 14px monospace;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    #score-submit button:hover { opacity: 0.8; }
    #submit-score-btn {
      background: #00e5ff;
      color: #000;
      font-weight: bold;
    }
    #skip-score-btn {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.5);
    }
  </style>
  <body>
    <canvas id="game"></canvas>

    <!-- Leaderboard / nickname entry disabled for now (client-side only). -->

</html>
