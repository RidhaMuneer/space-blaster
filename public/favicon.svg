<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#12173a"/>
      <stop offset="100%" stop-color="#070718"/>
    </radialGradient>
    <linearGradient id="ship" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7bf0ff"/>
      <stop offset="55%" stop-color="#4dd0e1"/>
      <stop offset="100%" stop-color="#008394"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cdf5ff"/>
      <stop offset="60%" stop-color="#38b6ff"/>
      <stop offset="100%" stop-color="#38b6ff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- twinkling stars -->
  <circle cx="13" cy="14" r="1.4" fill="#ffffff" opacity="0.8"/>
  <circle cx="52" cy="18" r="1" fill="#b3e5fc" opacity="0.7"/>
  <circle cx="49" cy="47" r="1.2" fill="#ffffff" opacity="0.6"/>
  <circle cx="15" cy="44" r="0.9" fill="#b3e5fc" opacity="0.6"/>

  <!-- engine glow -->
  <circle cx="32" cy="34" r="24" fill="url(#glow)"/>

  <!-- exhaust flame -->
  <path d="M27 42 L32 60 L37 42 Z" fill="url(#flame)"/>

  <!-- ship body -->
  <path d="M32 10 L20.3 28 L15.8 46 L26.6 42.4 L37.4 42.4 L48.2 46 L43.7 28 Z"
        fill="url(#ship)" stroke="#80deea" stroke-width="1.4" stroke-linejoin="round"/>

  <!-- cockpit -->
  <circle cx="32" cy="27" r="3.4" fill="#e0f7fa"/>
  <circle cx="32" cy="27" r="1.6" fill="#0097a7"/>
</svg>
